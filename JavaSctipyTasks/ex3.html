<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise #3 Changing Image</title>
  <style>
    div {
      width: 200px;
      height:200px;
    }
    img {
      width:100%;
      height:100%;
    }
  </style>
</head>
<body>
    <select name="select" id="countries" onchange="fn(this)">
      <option value="select">Select:</option>
      <option value="nl">Netherlands</option>
      <option value="austria">Austria</option>
      <option value="norway">Norway</option>
    </select>
    <div>
      <img id="demo" src="">
    </div>

  <script>
    function fn(el){
      const option=el.value;
      if(option=="nl"){
        document.getElementById("demo").src= "./nl.png";
      }
      if(option=="austria"){
        document.getElementById("demo").src="./austria.png";
      }
      if(option=="norway"){
        document.getElementById("demo").src = "./Norway.png";
      }
  }
  </script>
</body>
</html>
