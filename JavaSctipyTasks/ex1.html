<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise #1</title>
  <style>
    div {
      width:40%;
      height:10vh;
      background-color: yellow;
      text-align: center;
      padding-top:2em;
      border:1px solid black;
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <div id="demo" onmouseover="mOver()" onmouseout="mOut()">Hello World!</div>

  <script>
    function mOver() {
      demo.innerHTML = "Can I Help You?";
    }

    function mOut() {
      demo.innerHTML = "Hello World!";
    }
    
  </script>
</body>
</html>
